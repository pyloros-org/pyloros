# Pyloros proxy VM for the Lima sandbox example.
#
# Runs the pyloros binary and listens on the user-v2 network so the sandbox
# VM can reach it as `lima-pyloros.internal`. Upstream internet access is
# provided by user-v2's own gateway (192.168.104.1) — pyloros itself is not
# sandboxed.
#
# Prereqs on the host:
#   1. Build pyloros:  cargo build --release
#   2. Generate a CA:  ./target/release/pyloros generate-ca --out ./certs/
#   3. Define the user-v2 network in ~/.lima/_config/networks.yaml:
#        networks:
#          pyloros-v2:
#            mode: user-v2
#            gateway: 192.168.104.1
#            netmask: 255.255.255.0
#
# Start:
#   limactl start --name pyloros examples/lima/pyloros.yaml

vmType: qemu
cpus: 2
memory: 2GiB
disk: 10GiB

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

networks:
  - lima: pyloros-v2

# NOTE: Edit these absolute paths to match your checkout before starting.
# The committed example uses placeholders; a follow-up can templatize via
# lima's `param:` + `--set` once the shape is validated.
mounts:
  - location: "/home/zyla.linux/pyloros-worktrees/lima-example/target/release"
    mountPoint: /mnt/pyloros-bin
  - location: "/home/zyla.linux/pyloros-worktrees/lima-example/certs"
    mountPoint: /mnt/pyloros-ca
  - location: "/home/zyla.linux/pyloros-worktrees/lima-example/examples/lima"
    mountPoint: /mnt/pyloros-config

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      mkdir -p /etc/pyloros /var/log/pyloros
      install -m 0755 /mnt/pyloros-bin/pyloros /usr/local/bin/pyloros
      install -m 0644 /mnt/pyloros-ca/ca.crt /etc/pyloros/ca.crt
      install -m 0600 /mnt/pyloros-ca/ca.key /etc/pyloros/ca.key
      install -m 0644 /mnt/pyloros-config/config.toml /etc/pyloros/config.toml

      cat >/etc/systemd/system/pyloros.service <<'UNIT'
      [Unit]
      Description=pyloros proxy
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart=/usr/local/bin/pyloros run \
        --config /etc/pyloros/config.toml \
        --ca-cert /etc/pyloros/ca.crt \
        --ca-key /etc/pyloros/ca.key \
        --bind 0.0.0.0:8080 \
        --direct-https-bind 0.0.0.0:443
      Restart=on-failure
      StandardOutput=append:/var/log/pyloros/pyloros.log
      StandardError=append:/var/log/pyloros/pyloros.log

      [Install]
      WantedBy=multi-user.target
      UNIT

      systemctl daemon-reload
      systemctl enable --now pyloros.service

probes:
  - description: "pyloros listening on :8080"
    script: |
      #!/bin/bash
      set -eux
      for i in $(seq 1 30); do
        if ss -ltn '( sport = :8080 )' | grep -q LISTEN; then exit 0; fi
        sleep 1
      done
      exit 1
    hint: "Pyloros didn't come up; check /var/log/pyloros/pyloros.log"
