# Docker Compose example: run containers with network access routed through
# the pyloros proxy.
#
# Architecture:
#
#   external network (bridge) ─── proxy ─── Internet
#                                   │ :8080 (HTTP CONNECT proxy)
#                                   │ :443  (direct HTTPS / SNI interception)
#                                   │ :80   (direct HTTP / Host-header interception)
#   internal network (--internal) ──┤
#                                   ├── dns (dnsmasq: * → proxy IP)
#                                   └── sandbox (HTTP_PROXY + DNS → proxy)
#
# The sandbox has NO direct internet access. Three interception modes coexist:
#   - Explicit proxy:  HTTP_PROXY / HTTPS_PROXY env vars point at proxy:8080.
#   - Direct HTTPS:    the dns service resolves every hostname to the proxy's
#                      IP, so clients that don't honor HTTP_PROXY (or that
#                      are run with --noproxy '*') still hit the proxy on :443.
#   - Direct HTTP:     the same wildcard DNS lands plain-http requests (e.g.
#                      apt/dnf to http:// mirrors) on the proxy on :80.
#
# Prerequisites:
#   1. Generate a CA:  pyloros generate-ca --out ./certs/
#      (or: cargo run -- generate-ca --out ./certs/)
#
# Usage:
#   # Set path to CA directory (absolute path required)
#   export CA_DIR="$(pwd)/certs"
#
#   # Start services (uses published Docker image by default)
#   docker compose -f examples/docker-compose/compose.yaml up -d
#
#   # Or use a local image:
#   export PROXY_IMAGE="my-local-image:latest"
#   docker compose -f examples/docker-compose/compose.yaml up -d
#
#   # Run commands in the sandbox
#   docker compose -f examples/docker-compose/compose.yaml exec sandbox sh
#
#   # Tear down
#   docker compose -f examples/docker-compose/compose.yaml down
#
# Running multiple instances on one host:
#   Docker refuses overlapping subnets, so override the defaults per-instance:
#     export PYLOROS_SUBNET=172.31.0.0/24
#     export PYLOROS_PROXY_IP=172.31.0.254
#     export PYLOROS_DNS_IP=172.31.0.253
#   All three must be consistent (IPs inside the subnet).

services:
  proxy:
    image: ${PROXY_IMAGE:-ghcr.io/pyloros-org/pyloros:latest}
    volumes:
      - ./config.toml:/etc/pyloros/config.toml:ro
      - ${CA_DIR:?Set CA_DIR to absolute path of CA certificate directory}/ca.crt:/etc/pyloros/ca.crt:ro
      - ${CA_DIR:?Set CA_DIR to absolute path of CA certificate directory}/ca.key:/etc/pyloros/ca.key:ro
    command:
      - run
      - --config
      - /etc/pyloros/config.toml
      - --ca-cert
      - /etc/pyloros/ca.crt
      - --ca-key
      - /etc/pyloros/ca.key
      - --bind
      - "0.0.0.0:8080"
      - --direct-https-bind
      - "0.0.0.0:443"
      - --direct-http-bind
      - "0.0.0.0:80"
    networks:
      external:
      internal:
        ipv4_address: ${PYLOROS_PROXY_IP:-172.30.0.254}
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  dns:
    # Tiny wildcard DNS: every hostname resolves to the proxy's internal IP.
    # Built from dns/Dockerfile (dnsmasq baked in) so the running container
    # does not need internet access — only the build does.
    build: ./dns
    command: ["--address=/#/${PYLOROS_PROXY_IP:-172.30.0.254}"]
    networks:
      internal:
        ipv4_address: ${PYLOROS_DNS_IP:-172.30.0.253}
    healthcheck:
      test: ["CMD", "nc", "-z", "-w", "1", "127.0.0.1", "53"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 2s

  sandbox:
    image: ${SANDBOX_IMAGE:-alpine:latest}
    command: sleep infinity
    depends_on:
      proxy:
        condition: service_healthy
      dns:
        condition: service_healthy
    dns:
      - ${PYLOROS_DNS_IP:-172.30.0.253}
    environment:
      - HTTP_PROXY=http://proxy:8080
      - HTTPS_PROXY=http://proxy:8080
      - http_proxy=http://proxy:8080
      - https_proxy=http://proxy:8080
      - no_proxy=
      - SSL_CERT_FILE=/etc/pyloros/ca.crt
      - CURL_CA_BUNDLE=/etc/pyloros/ca.crt
      - NODE_EXTRA_CA_CERTS=/etc/pyloros/ca.crt
      - GIT_SSL_CAINFO=/etc/pyloros/ca.crt
      - REQUESTS_CA_BUNDLE=/etc/pyloros/ca.crt
    volumes:
      - ${CA_DIR:?Set CA_DIR to absolute path of CA certificate directory}/ca.crt:/etc/pyloros/ca.crt:ro
    networks:
      - internal

networks:
  external:
    driver: bridge
  internal:
    internal: true
    ipam:
      config:
        - subnet: ${PYLOROS_SUBNET:-172.30.0.0/24}
