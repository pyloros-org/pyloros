# Example proxy config for Docker Compose sandbox.
# CA cert/key are passed via CLI flags in compose.yaml.

[proxy]
bind_address = "0.0.0.0:8080"
# Path for generated local credential secrets (shared with sandbox via volume)
generated_secrets_file = "/run/pyloros/secrets.env"

[logging]
level = "info"
log_requests = true

# Allow curl to example.com (used by test script). example.com is IANA-reserved
# and stable; its current cert chain verifies via the proxy's built-in
# webpki-roots, so it works even inside the Alpine-based proxy image.
[[rules]]
method = "GET"
url = "https://example.com/"

# Allow git clone of a small public repo
[[rules]]
git = "fetch"
url = "https://github.com/octocat/Hello-World"

# Allow GitHub API access
[[rules]]
method = "*"
url = "https://api.github.com/*"

# Credential injection with generated local credentials.
# The proxy generates random local credential values at startup and writes them
# to /run/pyloros/secrets.env. The sandbox loads that file on boot.
# To use: set GITHUB_TOKEN env var on the proxy container.
#
# [[credentials]]
# url = "https://api.github.com/*"
# header = "authorization"
# value = "Bearer ${GITHUB_TOKEN}"
# local_generated = true
